<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Pile of Puppies</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    :root {
      --bg-1: #090611;
      --bg-2: #170f2a;
      --neon-cyan: #67f2ff;
      --neon-orange: #ff8f45;
      --neon-pink: #ff49b6;
      --gold: #f5d798;
      --gold-deep: #ab7e35;
      --panel: rgba(14, 16, 30, 0.66);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      position: relative;
      justify-content: center;
      padding: 3.5vh 2vw;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 73, 182, 0.16), transparent 26%),
        radial-gradient(circle at 84% 22%, rgba(103, 242, 255, 0.18), transparent 24%),
        radial-gradient(circle at 52% 78%, rgba(255, 143, 69, 0.14), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 56%, #05060a);
      overflow: hidden auto;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(120deg, transparent 0 44%, rgba(255, 255, 255, 0.04) 47%, transparent 50% 100%),
        linear-gradient(300deg, transparent 0 58%, rgba(255, 255, 255, 0.025) 61%, transparent 64% 100%);
      animation: skyShift 18s linear infinite;
    }

    body::after {
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.48) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(255, 255, 255, 0.3) 0 1px, transparent 1.5px);
      background-size: 120px 120px, 180px 180px;
      background-position: 0 0, 60px 20px;
      opacity: 0.2;
      animation: starDrift 26s linear infinite;
    }

    .stage {
      width: 100%;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .showcase {
      position: relative;
      width: min(1380px, 100%);
      min-height: min(88vh, 940px);
      padding: clamp(14px, 1.6vw, 24px);
      border-radius: 40px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
      overflow: visible;
      isolation: isolate;
    }

    .brand-bar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      padding: 0 0 2px;
    }

    .brand-header {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0 4px;
      min-height: 180px;
    }

    .brand-header::before,
    .brand-header::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(16px);
      opacity: 0.85;
    }

    .brand-header::before {
      width: 280px;
      height: 120px;
      top: 12px;
      left: 50%;
      transform: translateX(-48%);
      background: radial-gradient(circle, rgba(255, 215, 90, 0.26), transparent 62%);
      animation: headerGlow 4.8s ease-in-out infinite;
    }

    .brand-header::after {
      width: 340px;
      height: 80px;
      bottom: 6px;
      left: 50%;
      transform: translateX(-52%);
      background: radial-gradient(circle, rgba(103, 242, 255, 0.16), transparent 60%);
      animation: headerGlow 5.7s ease-in-out infinite reverse;
    }

    .brand-logo {
      position: relative;
      display: block;
      width: min(880px, 76vw);
      max-width: 100%;
      max-height: 220px;
      height: auto;
      object-fit: contain;
      object-position: center top;
      filter: drop-shadow(0 18px 38px rgba(0, 0, 0, 0.35));
      transform: translateY(-2px);
    }

    .brand-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.03));
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.35);
      opacity: 0.92;
      animation: particleFloat 6s linear infinite;
      pointer-events: none;
    }

    .brand-particle:nth-child(1) {
      width: 10px;
      height: 10px;
      top: 18%;
      left: 18%;
      animation-delay: 0s;
    }

    .brand-particle:nth-child(2) {
      display: none;
    }

    .brand-particle:nth-child(3) {
      width: 8px;
      height: 8px;
      top: 46%;
      left: 12%;
      animation-delay: 1.9s;
    }

    .brand-particle:nth-child(4) {
      width: 10px;
      height: 10px;
      bottom: 22%;
      right: 16%;
      animation-delay: 2.7s;
    }

    .brand-particle:nth-child(5) {
      width: 9px;
      height: 9px;
      bottom: 18%;
      left: 28%;
      animation-delay: 4.2s;
    }

    @keyframes headerGlow {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
      50% { transform: translateX(-50%) scale(1.08); opacity: 1; }
    }

    @keyframes particleFloat {
      0% { transform: translate(0, 0) scale(0.92); opacity: 0.88; }
      25% { transform: translate(10px, -12px) scale(1.05); opacity: 1; }
      50% { transform: translate(-6px, 10px) scale(0.98); opacity: 0.9; }
      75% { transform: translate(8px, 4px) scale(0.95); opacity: 0.78; }
      100% { transform: translate(0, 0) scale(0.92); opacity: 0.88; }
    }

     .showcase::before,
     .showcase::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(12px);
      opacity: 0.75;
      pointer-events: none;
    }

    .showcase::before {
      top: -120px;
      left: -80px;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(255, 73, 182, 0.22), transparent 68%);
      animation: auraPulse 7s ease-in-out infinite;
    }

    .showcase::after {
      right: -100px;
      bottom: -120px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(103, 242, 255, 0.2), transparent 70%);
      animation: auraPulse 9s ease-in-out infinite reverse;
    }

    .ad-worlds {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: clamp(18px, 2vw, 28px);
      align-items: start;
      min-height: min(72vh, 760px);
      margin-top: -12px;
      padding-bottom: 18px;
    }

    .portal {
      position: relative;
      min-height: 720px;
      border-radius: 34px;
      overflow: hidden;
      transform-style: preserve-3d;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.32);
    }

    .portal::before,
    .portal::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .portal-shell {
      position: absolute;
      inset: 14px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(8, 10, 20, 0.54);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .portal-image {
      position: absolute;
      inset: 26px;
      border-radius: 24px;
      background-size: cover;
      background-repeat: no-repeat;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
      transform: translate3d(var(--shift-x, 0px), var(--shift-y, 0px), 0) scale(1.04);
      transition: transform 0.45s ease;
    }

    .portal:hover .portal-image,
    .portal:focus-within .portal-image {
      transform: translate3d(calc(var(--shift-x, 0px) * 1.35), calc(var(--shift-y, 0px) * 1.35), 0) scale(1.07);
    }

    .portal-core {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .dx10 {
      background:
        linear-gradient(180deg, rgba(15, 7, 39, 0.84), rgba(8, 7, 20, 0.34)),
        radial-gradient(circle at top center, rgba(255, 123, 61, 0.22), transparent 34%),
        radial-gradient(circle at 24% 68%, rgba(29, 220, 255, 0.18), transparent 24%);
    }

    .dx10::before {
      background:
        linear-gradient(90deg, rgba(103, 242, 255, 0.12), rgba(255, 73, 182, 0.06), rgba(255, 143, 69, 0.12)),
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0 2px, transparent 2px 9px);
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    .dx10::after {
      inset: 20px;
      border-radius: 28px;
      border: 1px solid rgba(103, 242, 255, 0.35);
      box-shadow:
        inset 0 0 24px rgba(103, 242, 255, 0.12),
        0 0 0 1px rgba(255, 143, 69, 0.18),
        0 0 40px rgba(255, 73, 182, 0.14);
    }

    .dx10 .portal-image {
      background-image:
        linear-gradient(180deg, rgba(11, 7, 21, 0.02), rgba(11, 7, 21, 0.34)),
        url('DX10ad.jpg');
      background-position: center center;
      animation: arcadeFloat 8s ease-in-out infinite;
    }

    .dx10 .portal-shell::before,
    .dx10 .portal-shell::after,
    .igg .portal-shell::before,
    .igg .portal-shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .dx10 .portal-shell::before {
      left: -8%;
      top: 20%;
      width: 116%;
      height: 22%;
      background: linear-gradient(90deg, transparent, rgba(103, 242, 255, 0.35), rgba(255, 143, 69, 0.4), transparent);
      transform: rotate(-13deg);
      filter: blur(12px);
      opacity: 0.72;
      animation: ribbonRace 7.5s linear infinite;
    }

    .dx10 .portal-shell::after {
      right: -12%;
      bottom: 18%;
      width: 88%;
      height: 16%;
      background: linear-gradient(90deg, transparent, rgba(255, 73, 182, 0.28), rgba(103, 242, 255, 0.26), transparent);
      transform: rotate(16deg);
      filter: blur(14px);
      animation: ribbonRace 9s linear infinite reverse;
    }

    .pixel-orb,
    .spark {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
    }

    .pixel-orb {
      width: 14px;
      height: 14px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.95), rgba(255, 143, 69, 0.75) 38%, rgba(255, 73, 182, 0.3) 72%, transparent 76%);
      box-shadow: 0 0 22px rgba(255, 143, 69, 0.34);
      animation: pixelDrift var(--duration, 8s) linear infinite;
      animation-delay: var(--delay, 0s);
      top: var(--top, 30%);
      left: var(--left, 20%);
    }

    .igg {
      background:
        linear-gradient(180deg, rgba(18, 16, 10, 0.76), rgba(8, 6, 8, 0.3)),
        radial-gradient(circle at 50% 20%, rgba(245, 215, 152, 0.18), transparent 28%),
        radial-gradient(circle at 50% 78%, rgba(166, 111, 255, 0.12), transparent 24%);
    }

    .igg::before {
      background:
        radial-gradient(circle at 50% 12%, rgba(245, 215, 152, 0.12), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 38%, rgba(255, 255, 255, 0.04));
      opacity: 0.78;
    }

    .igg::after {
      inset: 18px;
      border-radius: 28px;
      border: 1px solid rgba(245, 215, 152, 0.34);
      box-shadow:
        inset 0 0 24px rgba(245, 215, 152, 0.12),
        inset 0 -20px 42px rgba(171, 126, 53, 0.12),
        0 0 30px rgba(171, 126, 53, 0.14);
    }

    .igg .portal-image {
      inset: 34px 40px 28px;
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.26)),
        url('IGGMORPGad.jpg');
      background-position: center top;
      animation: shrineFloat 9s ease-in-out infinite;
    }

    .igg .portal-shell::before {
      inset: 18px 22% auto;
      height: 34%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 215, 152, 0.22), transparent 68%);
      filter: blur(8px);
      animation: haloBloom 6s ease-in-out infinite;
    }

    .igg .portal-shell::after {
      inset: auto 12% 10% 12%;
      height: 22%;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 60%);
      filter: blur(18px);
      opacity: 0.55;
    }

    .spark {
      width: var(--size, 12px);
      height: var(--size, 12px);
      background:
        linear-gradient(90deg, transparent 44%, rgba(255, 255, 255, 0.9) 50%, transparent 56%),
        linear-gradient(transparent 44%, rgba(255, 255, 255, 0.9) 50%, transparent 56%);
      filter: drop-shadow(0 0 6px rgba(245, 215, 152, 0.6));
      animation: sparkleTwirl var(--duration, 4.2s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      top: var(--top, 30%);
      left: var(--left, 20%);
    }

    .legacy-mini {
      position: absolute;
      right: 4px;
      bottom: -42px;
      width: min(250px, 31vw);
      min-width: 176px;
      min-height: 0;
      height: 76px;
      border-radius: 22px;
      z-index: 5;
      overflow: hidden;
      transform-style: flat;
      background:
        linear-gradient(135deg, rgba(10, 13, 24, 0.86), rgba(14, 18, 34, 0.66)),
        rgba(10, 12, 22, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.34);
    }

    .legacy-mini::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg, rgba(103, 242, 255, 0.14), transparent 34%, rgba(255, 73, 182, 0.12) 70%, transparent);
      pointer-events: none;
    }

    .legacy-mini .portal-shell {
      inset: 8px;
      border-radius: 16px;
      background: rgba(8, 12, 24, 0.55);
    }

    .legacy-mini .portal-image {
      inset: 10px 52px 10px 12px;
      border-radius: 12px;
      background-image:
        linear-gradient(180deg, rgba(11, 14, 24, 0.06), rgba(11, 14, 24, 0.28)),
        url('JL.png');
      background-position: left center;
      background-size: auto 82%;
      background-repeat: no-repeat;
      animation: legacyFloat 7s ease-in-out infinite;
    }

    .legacy-mini:hover .portal-image,
    .legacy-mini:focus-within .portal-image {
      transform: translate3d(calc(var(--shift-x, 0px) * 0.6), calc(var(--shift-y, 0px) * 0.6), 0) scale(1.03);
    }

    .legacy-hit {
      position: absolute;
      inset: 0;
      z-index: 5;
      border-radius: inherit;
    }

    .portal-hit {
      position: absolute;
      inset: 0;
      z-index: 5;
      border-radius: inherit;
    }

    .debug-counter {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: grid;
      gap: 2px;
      min-width: 180px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(6, 8, 18, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      color: rgba(245, 248, 255, 0.92);
      font: 600 12px/1.3 "Segoe UI", Arial, sans-serif;
      letter-spacing: 0.03em;
      backdrop-filter: blur(10px);
    }

    .debug-counter[hidden] {
      display: none;
    }

    .debug-counter strong {
      font-size: 11px;
      text-transform: uppercase;
      color: rgba(103, 242, 255, 0.95);
    }

    .debug-counter span {
      display: block;
    }

    @keyframes skyShift {
      from { transform: translate3d(-2%, 0, 0); }
      to { transform: translate3d(2%, 0, 0); }
    }

    @keyframes starDrift {
      from { transform: translateY(0); }
      to { transform: translateY(-120px); }
    }

    @keyframes auraPulse {
      0%, 100% { transform: scale(1); opacity: 0.58; }
      50% { transform: scale(1.12); opacity: 0.9; }
    }

    @keyframes arcadeFloat {
      0%, 100% { transform: translate3d(var(--shift-x, 0px), calc(var(--shift-y, 0px) - 6px), 0) scale(1.04); }
      50% { transform: translate3d(calc(var(--shift-x, 0px) + 4px), calc(var(--shift-y, 0px) + 8px), 0) scale(1.07); }
    }

    @keyframes shrineFloat {
      0%, 100% { transform: translate3d(var(--shift-x, 0px), calc(var(--shift-y, 0px) - 4px), 0) scale(1.04); }
      50% { transform: translate3d(calc(var(--shift-x, 0px) - 3px), calc(var(--shift-y, 0px) + 10px), 0) scale(1.065); }
    }

    @keyframes ribbonRace {
      from { transform: translateX(-6%) rotate(-13deg); }
      to { transform: translateX(6%) rotate(-13deg); }
    }

    @keyframes pixelDrift {
      0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      60% { opacity: 1; }
      100% { transform: translate3d(26px, -84px, 0) scale(1.3); opacity: 0; }
    }

    @keyframes haloBloom {
      0%, 100% { transform: scale(0.95); opacity: 0.38; }
      50% { transform: scale(1.08); opacity: 0.72; }
    }

    @keyframes sparkleTwirl {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(0.7); opacity: 0.4; }
      50% { transform: translate3d(10px, -16px, 0) rotate(90deg) scale(1.1); opacity: 1; }
    }

    @keyframes legacyFloat {
      0%, 100% { transform: translate3d(var(--shift-x, 0px), var(--shift-y, 0px), 0) scale(1.02); }
      50% { transform: translate3d(calc(var(--shift-x, 0px) + 2px), calc(var(--shift-y, 0px) - 6px), 0) scale(1.045); }
    }

    @media (max-width: 1100px) {
      .ad-worlds {
        grid-template-columns: 1fr;
        min-height: auto;
        margin-top: -8px;
        padding-bottom: 16px;
      }

      .portal {
        min-height: 620px;
      }

      .legacy-mini {
        right: 0;
        bottom: -36px;
        width: 210px;
        min-height: 0;
        height: 70px;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px 10px 20px;
      }

      .showcase {
        min-height: auto;
        border-radius: 28px;
        padding: 12px;
      }

      .brand-bar {
        padding: 0 0 2px;
      }

      .brand-logo {
        width: min(360px, 78vw);
        max-height: 92px;
      }

      .ad-worlds {
        margin-top: -4px;
        padding-bottom: 10px;
      }

      .portal {
        min-height: 440px;
        border-radius: 24px;
      }

      .portal-shell {
        inset: 10px;
        border-radius: 18px;
      }

      .portal-image,
      .igg .portal-image {
        inset: 18px;
        border-radius: 18px;
      }

      .legacy-mini {
        right: 2px;
        bottom: -24px;
        width: 150px;
        min-width: 150px;
        min-height: 0;
        height: 54px;
        border-radius: 16px;
      }

      .legacy-mini .portal-shell {
        inset: 6px;
        border-radius: 12px;
      }

      .legacy-mini .portal-image {
        inset: 7px 36px 7px 8px;
        border-radius: 10px;
        background-size: auto 72%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .portal-image {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="showcase" aria-label="Animated ad display">
      <header class="brand-bar">
        <div class="brand-header">
          <img class="brand-logo" src="../assets/JodyLabs.png" alt="JodyLabs" />
          <span class="brand-particle"></span>
          <span class="brand-particle"></span>
          <span class="brand-particle"></span>
          <span class="brand-particle"></span>
          <span class="brand-particle"></span>
        </div>
      </header>
      <div class="ad-worlds">
        <article class="portal dx10" data-depth="18">
          <div class="portal-shell">
            <div class="portal-image"></div>
            <span class="pixel-orb" style="--top:16%;--left:16%;--delay:-1.4s;--duration:7.5s;"></span>
            <span class="pixel-orb" style="--top:54%;--left:22%;--delay:-4.2s;--duration:9.2s;"></span>
            <span class="pixel-orb" style="--top:72%;--left:78%;--delay:-2.1s;--duration:8.1s;"></span>
            <span class="pixel-orb" style="--top:26%;--left:84%;--delay:-6.3s;--duration:10s;"></span>
          </div>
          <a class="portal-hit" href="https://jodylabs2.surge.sh/" target="_blank" rel="noreferrer" aria-label="Open DX10"></a>
          <div class="portal-core"></div>
        </article>

        <article class="portal igg" data-depth="14">
          <div class="portal-shell">
            <div class="portal-image"></div>
            <span class="spark" style="--top:13%;--left:22%;--delay:-1.6s;--duration:5s;--size:15px;"></span>
            <span class="spark" style="--top:18%;--left:78%;--delay:-3.4s;--duration:4.4s;--size:12px;"></span>
            <span class="spark" style="--top:66%;--left:19%;--delay:-2.2s;--duration:5.6s;--size:14px;"></span>
            <span class="spark" style="--top:74%;--left:80%;--delay:-4.8s;--duration:4.8s;--size:13px;"></span>
            <span class="spark" style="--top:46%;--left:87%;--delay:-0.8s;--duration:5.2s;--size:10px;"></span>
          </div>
          <a class="portal-hit" href="IGGMORPGad.jpg" target="_blank" rel="noreferrer" aria-label="Open IGGMORPG"></a>
          <div class="portal-core"></div>
        </article>

        <article class="portal legacy-mini" data-depth="6" aria-label="Legacy JodyLabs link">
          <div class="portal-shell">
            <div class="portal-image"></div>
          </div>
          <a class="legacy-hit" href="https://jodylabs.surge.sh/index.html" target="_blank" rel="noreferrer" aria-label="Open Legacy JodyLabs"></a>
        </article>
      </div>
    </section>
  </main>

  <aside id="debug-counter" class="debug-counter" hidden aria-live="polite">
    <strong>Debug Counter</strong>
    <span id="debug-counter-value">Visits: --</span>
    <span id="debug-counter-status">Status: hidden</span>
  </aside>

  <script>
    const portals = Array.from(document.querySelectorAll('.portal'));
    const debugCounter = document.getElementById('debug-counter');
    const debugCounterValue = document.getElementById('debug-counter-value');
    const debugCounterStatus = document.getElementById('debug-counter-status');
    const counterConfig = {
      url: 'https://kbflseywzxikuzndvkpw.supabase.co',
      anonKey: 'sb_publishable_r2V19OpmwUFvXqDPkmPgvQ_i4RKcsAR',
      rpc: 'increment_page_visit',
      pageSlug: 'apileofpuppies'
    };

    function setDebugCounter(value, status) {
      if (typeof value !== 'undefined') {
        debugCounterValue.textContent = 'Visits: ' + value;
      }
      if (status) {
        debugCounterStatus.textContent = 'Status: ' + status;
      }
    }

    async function refreshVisitCounter() {
      if (!counterConfig.url || !counterConfig.anonKey) {
        setDebugCounter('--', 'supabase not configured');
        return;
      }

      setDebugCounter('...', 'syncing');

      try {
        const response = await fetch(counterConfig.url.replace(/\/$/, '') + '/rest/v1/rpc/' + counterConfig.rpc, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            apikey: counterConfig.anonKey,
            Authorization: 'Bearer ' + counterConfig.anonKey
          },
          body: JSON.stringify({ page_slug: counterConfig.pageSlug })
        });

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const payload = await response.json();
        const count = typeof payload === 'number'
          ? payload
          : payload?.count ?? payload?.visits ?? payload?.value ?? '--';

        setDebugCounter(count, 'supabase connected');
      } catch (error) {
        setDebugCounter('error', error.message || 'request failed');
      }
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'F8') {
        event.preventDefault();
        const nextHidden = !debugCounter.hasAttribute('hidden');
        if (nextHidden) {
          debugCounter.setAttribute('hidden', '');
        } else {
          debugCounter.removeAttribute('hidden');
        }
      }
    });

    function updatePortalMotion(portal, event) {
      const rect = portal.getBoundingClientRect();
      const offsetX = event.clientX - rect.left - rect.width / 2;
      const offsetY = event.clientY - rect.top - rect.height / 2;
      const depth = Number(portal.dataset.depth || 12);
      const rotateY = (offsetX / rect.width) * 10;
      const rotateX = (offsetY / rect.height) * -10;
      const shiftX = (offsetX / rect.width) * depth;
      const shiftY = (offsetY / rect.height) * depth;

      portal.style.transform = 'perspective(1400px) rotateX(' + rotateX.toFixed(2) + 'deg) rotateY(' + rotateY.toFixed(2) + 'deg)';
      portal.style.setProperty('--shift-x', shiftX.toFixed(2) + 'px');
      portal.style.setProperty('--shift-y', shiftY.toFixed(2) + 'px');
    }

    function resetPortalMotion(portal) {
      portal.style.transform = 'perspective(1400px) rotateX(0deg) rotateY(0deg)';
      portal.style.setProperty('--shift-x', '0px');
      portal.style.setProperty('--shift-y', '0px');
    }

    portals.forEach((portal) => {
      resetPortalMotion(portal);
      portal.addEventListener('pointermove', (event) => updatePortalMotion(portal, event));
      portal.addEventListener('pointerleave', () => resetPortalMotion(portal));
      portal.addEventListener('pointercancel', () => resetPortalMotion(portal));
    });

    refreshVisitCounter();
  </script>
</body>
</html>
