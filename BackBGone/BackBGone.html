<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackBGone | AI Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkerboard {
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                              linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                              linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg text-white font-bold">BG</div>
            <h1 class="text-xl font-black tracking-tight uppercase">BackBGone</h1>
        </div>
        <div id="statusIndicator" class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
            <span id="statusDot" class="w-2 h-2 bg-slate-300 rounded-full"></span>
            <span id="statusText">Initializing AI...</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-8">
        <div class="text-center py-12">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Pro Background Removal.</h2>
            <p class="text-slate-500 text-lg mb-10">Localized AI inference. No servers. Total privacy.</p>
            
            <label id="dropZone" class="group relative flex flex-col items-center justify-center w-full h-64 border-4 border-dashed border-slate-200 rounded-[2.5rem] bg-white hover:border-indigo-400 hover:bg-indigo-50/30 transition-all cursor-pointer overflow-hidden shadow-sm">
                <div class="flex flex-col items-center justify-center space-y-4">
                    <div class="p-5 bg-indigo-50 rounded-2xl group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </div>
                    <p class="text-sm font-bold text-slate-700">Click or drag images here</p>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
            </label>
        </div>

        <div id="loadingBarContainer" class="hidden mb-12 p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
            <div class="flex justify-between mb-2">
                <span class="text-sm font-bold text-slate-800">Downloading AI Model (176MB)...</span>
                <span id="progressPercent" class="text-xs font-mono font-bold text-indigo-600">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2">
                <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

        // Config
        env.allowLocalModels = false;
        let segmenter = null;

        const fileInput = document.getElementById('fileInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const loadingBarContainer = document.getElementById('loadingBarContainer');

        // Initialize AI
        async function init() {
            try {
                loadingBarContainer.classList.remove('hidden');
                segmenter = await pipeline('image-segmentation', 'Xenova/rmbg-1.4', {
                    device: navigator.gpu ? 'webgpu' : 'wasm',
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progressBar.style.width = p.progress + '%';
                            progressPercent.innerText = Math.round(p.progress) + '%';
                        }
                        if (p.status === 'done') {
                            loadingBarContainer.classList.add('hidden');
                        }
                    }
                });
                statusText.innerText = "System Ready";
                statusDot.classList.replace('bg-slate-300', 'bg-emerald-500');
            } catch (err) {
                statusText.innerText = "Error: " + err.message;
                statusDot.classList.replace('bg-slate-300', 'bg-rose-500');
            }
        }

        init();

        // Handle Uploads
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                processImage(file);
            }
        });

        async function processImage(file) {
            const id = Math.random().toString(36).substr(2, 9);
            const url = URL.createObjectURL(file);
            
            // Create UI Card
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-3xl border border-slate-200 shadow-sm transition-all";
            card.innerHTML = `
                <div class="aspect-square bg-slate-100 rounded-2xl overflow-hidden relative checkerboard mb-4">
                    <img id="img-${id}" src="${url}" class="w-full h-full object-contain opacity-50 blur-sm transition-all duration-700">
                    <div id="loader-${id}" class="absolute inset-0 flex items-center justify-center bg-white/20">
                        <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <p class="text-xs font-bold truncate pr-4">${file.name}</p>
                    <a id="dl-${id}" class="hidden p-2 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </a>
                </div>
            `;
            resultsGrid.prepend(card);

            try {
                const result = await segmenter(url);
                const mask = result;

                // Canvas alpha matting
                const img = document.getElementById(`img-${id}`);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const originalImg = new Image();
                originalImg.src = url;
                await originalImg.decode();

                canvas.width = originalImg.width;
                canvas.height = originalImg.height;
                ctx.drawImage(originalImg, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Create scaled mask
                const maskCanvas = document.createElement('canvas');
                maskCanvas.width = mask.width;
                maskCanvas.height = mask.height;
                const maskCtx = maskCanvas.getContext('2d');
                const maskImageData = maskCtx.createImageData(mask.width, mask.height);
                for(let i=0; i<mask.data.length; i++) {
                    const v = mask.data[i];
                    maskImageData.data[i*4]=v; maskImageData.data[i*4+1]=v; maskImageData.data[i*4+2]=v; maskImageData.data[i*4+3]=255;
                }
                maskCtx.putImageData(maskImageData, 0, 0);

                const finalMaskCanvas = document.createElement('canvas');
                finalMaskCanvas.width = canvas.width;
                finalMaskCanvas.height = canvas.height;
                finalMaskCanvas.getContext('2d').drawImage(maskCanvas, 0, 0, canvas.width, canvas.height);
                const finalMaskData = finalMaskCanvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;

                for(let i=0; i<imageData.data.length; i+=4) {
                    imageData.data[i+3] = finalMaskData[i];
                }

                ctx.putImageData(imageData, 0, 0);
                const resultUrl = canvas.toDataURL('image/png');

                // Update UI
                img.src = resultUrl;
                img.classList.remove('opacity-50', 'blur-sm');
                document.getElementById(`loader-${id}`).remove();
                const dl = document.getElementById(`dl-${id}`);
                dl.href = resultUrl;
                dl.download = `no-bg-${file.name.split('.')[0]}.png`;
                dl.classList.remove('hidden');

            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
