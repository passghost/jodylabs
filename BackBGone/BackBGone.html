<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackBGone | Edge AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkerboard {
            background-image: linear-gradient(45deg, #f8f8f8 25%, transparent 25%), 
                              linear-gradient(-45deg, #f8f8f8 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #f8f8f8 75%), 
                              linear-gradient(-45deg, transparent 75%, #f8f8f8 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen font-sans text-zinc-900">

    <nav class="bg-white border-b border-zinc-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">BackBGone</h1>
        </div>
        <div id="statusIndicator" class="flex items-center gap-3 bg-white px-4 py-2 rounded-full border border-zinc-200 shadow-sm">
            <div id="statusDot" class="w-2 h-2 bg-zinc-300 rounded-full animate-pulse"></div>
            <span id="statusText" class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Connecting...</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <div class="max-w-2xl mx-auto text-center mb-16">
            <h2 class="text-5xl font-black text-zinc-950 mb-6 tracking-tight leading-tight">Zero-Click AI Matting.</h2>
            <p class="text-zinc-500 text-lg mb-10">High-precision segmentation. 100% Client-side.</p>
            
            <label class="group relative flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-zinc-300 rounded-[2.5rem] bg-white hover:border-indigo-500 hover:bg-indigo-50/20 transition-all cursor-pointer shadow-sm">
                <div class="flex flex-col items-center justify-center space-y-4">
                    <div class="p-5 bg-indigo-50 rounded-2xl group-hover:scale-110 transition-transform duration-500">
                        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </div>
                    <p class="text-sm font-bold text-zinc-700">Select images</p>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
            </label>
        </div>

        <div id="loadingBarContainer" class="hidden fixed bottom-8 right-8 w-80 p-6 bg-white rounded-3xl border border-zinc-200 shadow-2xl z-50">
            <div class="flex justify-between mb-3 text-zinc-800">
                <span class="text-[10px] font-black uppercase tracking-wider text-zinc-500">Loading Intelligence...</span>
                <span id="progressPercent" class="text-xs font-mono font-bold text-indigo-600">0%</span>
            </div>
            <div class="w-full bg-zinc-100 rounded-full h-1.5 overflow-hidden">
                <div id="progressBar" class="bg-indigo-600 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module">
        // Import specific classes to avoid the buggy auto-pipeline
        import { AutoModel, AutoProcessor, RawImage, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        // Pointing directly to the model folder
        const MODEL_ID = 'briaai/RMBG-1.4';

        let model = null;
        let processor = null;

        const fileInput = document.getElementById('fileInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const loadingBarContainer = document.getElementById('loadingBarContainer');

        async function init() {
            try {
                loadingBarContainer.classList.remove('hidden');
                statusText.innerText = "Downloading Model...";
                
                // Load model and processor individually
                // This forces the library to use the correct architecture
                [model, processor] = await Promise.all([
                    AutoModel.from_pretrained(MODEL_ID, {
                        device: navigator.gpu ? 'webgpu' : 'wasm',
                        progress_callback: (p) => {
                            if (p.status === 'progress') {
                                progressBar.style.width = p.progress + '%';
                                progressPercent.innerText = Math.round(p.progress) + '%';
                            }
                        }
                    }),
                    AutoProcessor.from_pretrained(MODEL_ID)
                ]);

                loadingBarContainer.classList.add('hidden');
                statusText.innerText = "Edge Active";
                statusDot.classList.replace('bg-zinc-300', 'bg-emerald-500');
                statusDot.classList.remove('animate-pulse');
            } catch (err) {
                console.error("Initialization Failed:", err);
                statusText.innerText = "Error: Check Console";
                statusDot.classList.replace('bg-zinc-300', 'bg-rose-500');
            }
        }

        init();

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                await processImage(file);
            }
        });

        async function processImage(file) {
            const id = Math.random().toString(36).substr(2, 9);
            const url = URL.createObjectURL(file);
            
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-[2.5rem] border border-zinc-200 shadow-sm group";
            card.innerHTML = `
                <div class="aspect-square bg-zinc-50 rounded-[1.8rem] overflow-hidden relative checkerboard mb-5">
                    <img id="img-${id}" src="${url}" class="w-full h-full object-contain opacity-30 blur-md transition-all duration-1000 scale-90">
                    <div id="loader-${id}" class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center px-2">
                    <div class="min-w-0 pr-4">
                        <p class="text-sm font-bold truncate text-zinc-900">${file.name}</p>
                        <p id="label-${id}" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mt-1">Processing</p>
                    </div>
                    <a id="dl-${id}" class="hidden w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg transition-all scale-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </a>
                </div>
            `;
            resultsGrid.prepend(card);

            try {
                // MANUAL INFERENCE FLOW
                const image = await RawImage.fromURL(url);
                const { pixel_values } = await processor(image);
                const { output } = await model({ input: pixel_values });
                
                // Post-process the output tensor into an alpha mask
                const mask = await RawImage.fromTensor(output.mul(255).to('uint8')).resize(image.width, image.height);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = image.width;
                canvas.height = image.height;
                
                // Draw original
                const originalImg = new Image();
                originalImg.src = url;
                await originalImg.decode();
                ctx.drawImage(originalImg, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Apply the mask to the alpha channel
                for(let i=0; i < imageData.data.length; i += 4) {
                    imageData.data[i+3] = mask.data[i/4 * 4]; // Use the red channel of the mask as alpha
                }

                ctx.putImageData(imageData, 0, 0);
                const resultUrl = canvas.toDataURL('image/png');

                // UI UPDATES
                const imgDisplay = document.getElementById(`img-${id}`);
                imgDisplay.src = resultUrl;
                imgDisplay.classList.remove('opacity-30', 'blur-sm', 'scale-90');
                imgDisplay.classList.add('scale-100');
                
                document.getElementById(`loader-${id}`).remove();
                document.getElementById(`label-${id}`).innerText = "Complete";
                document.getElementById(`label-${id}`).classList.replace('text-zinc-400', 'text-emerald-500');
                
                const dl = document.getElementById(`dl-${id}`);
                dl.href = resultUrl;
                dl.download = `BackBGone_${file.name.split('.')[0]}.png`;
                dl.classList.remove('hidden', 'scale-0');
                dl.classList.add('scale-100');

            } catch (err) {
                console.error(err);
                document.getElementById(`label-${id}`).innerText = "Inference Error";
            }
        }
    </script>
</body>
</html>
