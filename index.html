<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-start: #071226;
      --bg-end: #0c2340;
      --accent: #ffc34d;
      --accent-dark: #d18e0e;
      --text: #f8fafc;
      --line: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.1), transparent 25%),
                  linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .scene {
      perspective: 1100px;
      perspective-origin: 50% 40%;
      width: min(100%, 900px);
      padding: 2rem;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 520px;
      border-radius: 32px;
      background: rgba(8, 20, 44, 0.92);
      box-shadow: 0 45px 120px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      transform-style: preserve-3d;
      transform: rotateX(10deg) rotateY(-8deg);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(180deg, transparent, rgba(255,255,255,0.06));
      pointer-events: none;
    }

    .card::after {
      mix-blend-mode: screen;
      opacity: 0.35;
      transform: translateZ(-1px);
    }

    .lights {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle at 20% 15%, rgba(255,255,255,0.08), transparent 12%),
                        radial-gradient(circle at 85% 20%, rgba(255, 185, 70, 0.12), transparent 14%);
    }

    .banner {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 2;
      width: calc(100% - 4rem);
    }

    .banner h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255, 195, 78, 0.35);
    }

    .banner p {
      margin-top: 0.85rem;
      font-size: 1rem;
      color: rgba(248, 250, 252, 0.76);
      line-height: 1.7;
    }

    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform-style: preserve-3d;
    }

    .under-construction {
      position: relative;
      width: 420px;
      height: 260px;
      transform-style: preserve-3d;
      animation: float 8s ease-in-out infinite;
    }

    .panel {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffbe47 15%, #ffab00 80%);
      border-radius: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 28px 90px rgba(0,0,0,0.28);
      transform-style: preserve-3d;
      transform: translateZ(30px) rotateX(12deg);
      overflow: hidden;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.15) 0 24px, rgba(0,0,0,0) 24px 48px);
      opacity: 0.25;
      pointer-events: none;
    }

    .panel::after {
      background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0 5px, transparent 5px 10px);
      opacity: 0.14;
    }

    .stripe {
      position: absolute;
      inset: 18px;
      border-radius: 20px;
      background: linear-gradient(90deg, rgba(0,0,0,0.16) 15%, rgba(255,255,255,0.18) 15%, rgba(255,255,255,0.18) 35%, rgba(0,0,0,0.16) 35%, rgba(0,0,0,0.16) 65%, rgba(255,255,255,0.18) 65%, rgba(255,255,255,0.18) 85%, rgba(0,0,0,0.16) 85%);
      background-size: 140px 100%;
      animation: stripeMove 3s linear infinite;
      opacity: 0.85;
    }

    .sign {
      position: absolute;
      inset: 40px 40px 40px 40px;
      display: grid;
      place-items: center;
      transform: translateZ(48px);
      pointer-events: none;
    }

    .sign-text {
      text-align: center;
      color: #0a1221;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: clamp(1.1rem, 2vw, 1.8rem);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    .sign-text span {
      display: block;
      font-size: 0.85em;
      margin-top: 0.8rem;
      color: rgba(10,18,33,0.82);
      letter-spacing: 0.2em;
    }

    .barrier {
      position: absolute;
      bottom: -18px;
      left: 50%;
      width: 280px;
      height: 180px;
      transform: translateX(-50%) rotateY(-18deg) rotateX(16deg);
      transform-style: preserve-3d;
      animation: barrierTilt 5s ease-in-out infinite;
    }

    .beam {
      position: absolute;
      left: 50%;
      width: 100%;
      height: 24px;
      background: linear-gradient(90deg, #111 0%, #262626 50%, #111 100%);
      border-radius: 999px;
      transform: translateX(-50%) translateY(-14px) rotateX(14deg);
      box-shadow: 0 24px 32px rgba(0,0,0,0.25);
    }

    .beam::before {
      content: "";
      position: absolute;
      inset: 6px 18px;
      background: repeating-linear-gradient(90deg, #ffde79 0 16px, #333 16px 32px);
      border-radius: 999px;
      opacity: 0.95;
      animation: flash 1.7s infinite ease-in-out;
    }

    .wide-shadow {
      position: absolute;
      bottom: 12px;
      left: 50%;
      width: 360px;
      height: 74px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.22), transparent 65%);
      transform: translateX(-50%);
      filter: blur(4px);
      opacity: 0.65;
    }

    .floating-parts {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .floating-parts span {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 18px rgba(255, 195, 78, 0.15);
      animation: drift 7s ease-in-out infinite;
    }

    .floating-parts span:nth-child(1) { top: 18%; left: 16%; animation-delay: 0s; }
    .floating-parts span:nth-child(2) { top: 14%; left: 72%; width: 16px; height: 16px; animation-delay: 1.3s; }
    .floating-parts span:nth-child(3) { top: 58%; left: 10%; width: 18px; height: 18px; animation-delay: 2.1s; }
    .floating-parts span:nth-child(4) { top: 70%; left: 78%; animation-delay: 3.4s; }
    .floating-parts span:nth-child(5) { top: 46%; left: 52%; width: 14px; height: 14px; animation-delay: 4.8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotateX(10deg) rotateY(-8deg); }
      50% { transform: translateY(-18px) rotateX(11deg) rotateY(-7deg); }
    }

    @keyframes stripeMove {
      0% { background-position: 0 0; }
      100% { background-position: 140px 0; }
    }

    @keyframes barrierTilt {
      0%, 100% { transform: translateX(-50%) rotateY(-18deg) rotateX(16deg); }
      50% { transform: translateX(-50%) rotateY(-18deg) rotateX(10deg); }
    }

    @keyframes flash {
      0%, 100% { opacity: 0.95; }
      50% { opacity: 0.2; }
    }

    @keyframes drift {
      0% { transform: translateY(0) translateX(0); opacity: 0.14; }
      50% { transform: translateY(-20px) translateX(12px); opacity: 0.5; }
      100% { transform: translateY(0) translateX(0); opacity: 0.14; }
    }

    @media (max-width: 640px) {
      .card {
        min-height: 560px;
        border-radius: 24px;
      }

      .banner {
        top: 18px;
      }

      .banner h1 {
        font-size: 2.15rem;
      }

      .under-construction {
        width: 320px;
        height: 220px;
      }

      .barrier {
        width: 240px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card">
      <div class="lights"></div>
      <div class="banner">
        <h1>Under Construction</h1>
        <p>We’re building something awesome. Please check back soon for the finished experience.</p>
      </div>
      <div class="stage">
        <div class="under-construction">
          <div class="panel"></div>
          <div class="sign">
            <div class="sign-text">WORK IN<br><span>PROGRESS</span></div>
          </div>
          <div class="barrier">
            <div class="beam"></div>
          </div>
          <div class="wide-shadow"></div>
          <div class="floating-parts">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
